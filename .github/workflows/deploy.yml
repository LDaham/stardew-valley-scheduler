name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 유지 (진행 중이면 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # 개발 환경(Node 24 / npm 11)과 맞춰야 npm ci가 lockfile을 그대로 설치한다
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build (static export)
        run: npm run build
        env:
          # 프로젝트 사이트(id.github.io/repo)는 서브경로 배포 → basePath=/repo.
          # 사용자·조직 사이트(id.github.io) 또는 커스텀 도메인이면 빈 값으로 두세요.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
